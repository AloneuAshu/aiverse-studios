<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIVERSE STUDIOS // Futuristic AI Video Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="glow-mesh"></div>
  <div class="glow-mesh-overlay"></div>

  <div class="app-container">
    <!-- Left Sidebar -->
    <aside class="app-sidebar" id="appSidebar">
      <!-- Sidebar Branding -->
      <div class="sidebar-brand">
        <span class="sidebar-logo-text">AIVERSE</span>
        <span class="sidebar-logo-sub">STUDIOS</span>
      </div>

      <!-- Navigation Menu -->
      <nav class="sidebar-nav">
        <button class="sidebar-tab active" id="tabBatchGen" data-tab="batchGen" title="Batch Generator">
          <span class="tab-icon">⚡</span>
          <span class="tab-label">Batch Generator</span>
        </button>
        <button class="sidebar-tab" id="tabRandomGen" data-tab="randomGen" title="Random Clips">
          <span class="tab-icon">🎲</span>
          <span class="tab-label">Random Clips</span>
          <span class="tab-badge">5s/8s+</span>
        </button>
        <button class="sidebar-tab" id="tabCropStudio" data-tab="cropStudio" title="Crop Studio">
          <span class="tab-icon">🎞</span>
          <span class="tab-label">Crop Studio</span>
          <span class="tab-badge">9:16</span>
        </button>
        <button class="sidebar-tab" id="tabSubtitles" data-tab="subtitles" title="Subtitle Studio">
          <span class="tab-icon">💬</span>
          <span class="tab-label">Subtitle Studio</span>
          <span class="tab-badge">Auto</span>
        </button>
        <button class="sidebar-tab" id="tabTrimStudio" data-tab="trimStudio" title="Trim Studio">
          <span class="tab-icon">✂️</span>
          <span class="tab-label">Trim Studio</span>
          <span class="tab-badge">Orig</span>
        </button>
      </nav>

      <!-- Sidebar Footer Slogan -->
      <footer class="sidebar-footer">
        Justify Audience Experience.
      </footer>

      <!-- Sidebar Toggle Collapse Button -->
      <button class="sidebar-toggle-btn" id="btnSidebarToggle" title="Toggle Navigation">◀</button>
    </aside>

    <!-- Main Content Area -->
    <div class="app-main-content">
      <div id="appPanelContainer">
        <!-- The template HTML files will be fetched and appended here as tab-panels -->
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script src="app.js" type="module"></script>
</body>
</html>
